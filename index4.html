<!DOCTYPE html>
<html lang="id">
<head>
    <meta name="google-adsense-account" content="ca-pub-5512413766339626">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Pengurus - RW 05</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        /* --- CSS DASAR --- */
        *{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}
        body{
            line-height:1.6;
            color:#333;
            background:#f9f9f9; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column;
        }
        
        header {
            background:#ff7a00; 
            color:white; 
            padding:10px 0; 
            position:sticky; 
            top:0; 
            z-index:1000; 
            /* Shadow Oranye di Header */
            box-shadow: 0 2px 10px rgba(255, 122, 0, 0.3);
            width: 100%;
        }

        nav {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }

        .logo-area { display:flex; align-items:center; gap:10px; }
        .logo-area img { height:55px; width:55px; border-radius:12px; background: white; }
        
        nav ul { display:flex; list-style:none; }
        nav ul li { margin-left:25px; }
        nav a { color:white; text-decoration:none; font-weight:bold; font-size: 15px; }

        /* MENU GARIS 3: Ukuran diperbesar agar seimbang dan mudah diklik */
        .menu-toggle { 
            display: none; 
            font-size: 35px; 
            cursor: pointer; 
            color: white; 
            line-height: 1;
            padding: 5px;
        }

        .search-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            width: 100%;
        }

        .search-card {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 35px;
            border-radius: 20px;
            /* Shadow Oranye di Kartu Utama */
            box-shadow: 0 10px 30px rgba(255, 122, 0, 0.15); 
            text-align: center;
        }

        .search-card h2 { color: #ff7a00; font-size: 26px; margin-bottom: 10px; }
        .search-card p { color: #666; margin-bottom: 25px; font-size: 14px; }

        .input-group { display: flex; gap: 10px; margin-bottom: 25px; }

        input[type="text"] {
            flex: 1;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            outline: none;
            font-size: 16px;
        }
        input[type="text"]:focus { border-color: #ff7a00; }

        .btn-search {
            padding: 0 30px;
            background: #ff7a00;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-search:hover { background: #e66e00; }

        /* --- STYLE KARTU HASIL PENCAYRIAN --- */
        .pengurus-item {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            border-left: 6px solid #ff7a00;
            /* Shadow Oranye di Item Pengurus */
            box-shadow: 0 4px 12px rgba(255, 122, 0, 0.15); 
            margin-bottom: 15px;
            text-align: left;
        }

        .pengurus-item h3 { color: #333; margin-bottom: 5px; }

        .info-detail {
            font-size: 14px;
            color: #555;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .timestamp {
            margin-top: 15px;
            padding-top: 8px;
            border-top: 1px dashed #ddd;
            font-size: 11px;
            color: #999;
            font-style: italic;
        }

        footer { background:#222; color:white; text-align:center; padding:30px; width: 100%; }
        .feth-text { font-size: 11px; opacity: 0.5; margin-top: 8px; }

        @media(max-width: 768px) {
            .menu-toggle { display: block; }
            nav ul { 
                display: none; 
                flex-direction: column; 
                background: #ff7a00; 
                position: absolute; 
                top: 75px; 
                right: 0; 
                width: 100%; 
                z-index: 100;
                box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            }
            nav ul.show { display: flex; }
            nav ul li { margin: 15px 20px; }
            .input-group { flex-direction: column; }
            .info-detail { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo-area">
            <img src="katar.png" alt="Logo">
            <strong>Karang Taruna RW 05</strong>
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <ul id="menu">
            <li><a href="index.html">Beranda</a></li>
            <li><a href="index.html#kontak">Kontak</a></li>
            <li><a href="index2.html">Layanan</a></li>
        </ul>
    </nav>
</header>

<main class="search-wrapper">
    <div class="search-card">
        <h2>Data Pengurus</h2>
        <p>Gunakan nama lengkap pengurus untuk melihat profil dan jabatan.</p>
        
        <div class="input-group">
            <input type="text" id="inputCari" placeholder="Masukkan nama pengurus...">
            <button class="btn-search" onclick="mulaiCari()">Cari</button>
        </div>

        <div id="containerHasil"></div>
    </div>
</main>

<footer>
    <p>© 2026 Unit Kerja Karang Taruna RW 05</p>
    <p class="feth-text">Portal Digital Terpadu RW 05 - Pulo Gebang</p>
</footer>

<script>
    let dbPengurus = [];

    // Load data Excel
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('pengurus.xlsx');
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            dbPengurus = XLSX.utils.sheet_to_json(sheet);
            console.log("Database Pengurus Siap");
        } catch (err) {
            console.error("Gagal memuat pengurus.xlsx:", err);
        }
    });

    function mulaiCari() {
        const keyword = document.getElementById("inputCari").value.trim().toLowerCase();
        const box = document.getElementById("containerHasil");
        box.innerHTML = "";

        if(!keyword) { alert("Silakan masukkan nama!"); return; }

        // Filter data berdasarkan nama (Tetap sesuai logika awal)
        const hasil = dbPengurus.filter(p => 
            p.Nama && p.Nama.toString().toLowerCase().includes(keyword)
        );

        if(hasil.length > 0) {
            const sekarang = new Date();
            const waktuWIB = sekarang.toLocaleDateString('id-ID', { 
                day: 'numeric', month: 'long', year: 'numeric', 
                hour: '2-digit', minute: '2-digit' 
            });

            hasil.forEach(p => {
                const masaAktif = p["Masa Aktif"] || p.MasaAktif || "-";

                box.innerHTML += `
                <div class="pengurus-item" style="border-left: 6px solid #ff7a00; padding: 20px; background: #fff; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 12px rgba(255, 122, 0, 0.15);">
                    <h3 style="margin-bottom: 2px; color: #333;">${p.Nama}</h3>
                    <div style="color: #ff7a00; font-weight: bold; font-size: 14px; margin-bottom: 15px;">
                        ${p.Divisi || 'Anggota'}
                    </div>
                    
                    <div class="info-detail" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; color: #555;">
                        <p><b>Asal:</b> ${p.Asal || '-'} / RW 05</p>
                        <p><b>Masa Aktif:</b> ${masaAktif}</p>
                    </div>

                    <div class="timestamp" style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #ddd; font-size: 11px; color: #999; font-style: italic;">
                        Pencarian valid pada: ${waktuWIB} WIB
                    </div>
                </div>`;
            });
        } else {
            box.innerHTML = `<p style="color:#dc3545; text-align:center; margin-top:20px;">Pengurus tidak ditemukan.</p>`;
        }
    }

    function toggleMenu() { document.getElementById('menu').classList.toggle('show'); }

    document.getElementById("inputCari").addEventListener("keypress", (e) => {
        if (e.key === "Enter") mulaiCari();
    });
</script>
</body>
</html>
