<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Bansos RW 05</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 600px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { width: 70%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; }
        button { padding: 12px 20px; background: #ff7a00; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .result-item { text-align: left; border-left: 6px solid #ccc; padding: 15px; margin-top: 20px; background: #fff; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); position: relative; }
        .status-badge { position: absolute; top: 15px; right: 15px; padding: 4px 10px; border-radius: 10px; color: white; font-size: 11px; font-weight: bold; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .info-box span { display: block; font-size: 11px; color: #999; }
        .info-box strong { font-size: 14px; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cek Penerima Bansos</h2>
    <input type="text" id="inputCari" placeholder="Masukkan Nama atau NIK...">
    <button onclick="cariData()">CARI</button>

    <div id="hasilPencarian"></div>
</div>

<script>
    let dbBansos = [];

    // Mengambil data dari Excel (bansos.xlsx)
    window.addEventListener('DOMContentLoaded', async () => {
        try {
            const response = await fetch('bansos.xlsx');
            const arrayBuffer = await response.arrayBuffer();
            const workbook = XLSX.read(arrayBuffer, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            dbBansos = XLSX.utils.sheet_to_json(sheet);
            console.log("Data Excel Berhasil Dimuat", dbBansos);
        } catch (err) {
            console.error("Gagal memuat file Excel:", err);
        }
    });

    function cariData() {
        const input = document.getElementById("inputCari").value.trim().toLowerCase();
        const display = document.getElementById("hasilPencarian");
        display.innerHTML = "";

        if (!input) { alert("Masukkan Nama atau NIK!"); return; }

        // SESUAIKAN DENGAN HEADER EXCEL ANDA
        const hasil = dbBansos.filter(data => 
            (data["Nama"] && data["Nama"].toString().toLowerCase().includes(input)) ||
            (data["Nik"] && data["Nik"].toString().includes(input))
        );

        if (hasil.length > 0) {
            hasil.forEach(data => {
                // Menentukan warna badge berdasarkan "Status Kelayakan"
                const layak = data["Status Kelayakan"] === "Layak";
                const color = layak ? "#28a745" : "#dc3545";
                
                display.innerHTML += `
                    <div class="result-item" style="border-left-color: ${color}">
                        <span class="status-badge" style="background: ${color}">${data["Status Kelayakan"] || 'TIDAK DIKETAHUI'}</span>
                        <h3 style="margin:0;">${data["Nama"]}</h3>
                        <p style="font-size:12px; color:#777; margin: 5px 0;">
    NIK: ${data["Nik"] ? data["Nik"].toString().replace(/(\d{6})\d+(\d{4})/, "$1******$2") : 'Tidak Tersedia'}
</p>
                        
                        <div class="info-grid">
                            <div class="info-box"><span>JENIS BANTUAN</span><strong>${data["Jenis Bantuan"] || '-'}</strong></div>
                            <div class="info-box"><span>NOMINAL</span><strong>Rp ${data["Nominal Bantuan"] || '0'}</strong></div>
                            <div class="info-box"><span>PENYALURAN</span><strong style="color:#ff7a00">${data["Status Penyaluran"] || '-'}</strong></div>
                            <div class="info-box"><span>WILAYAH</span><strong>RT ${data["RT"] || '00'}/RW ${data["RW"] || '00'}</strong></div>
                        </div>
                        <p style="font-size:11px; color:#666; margin-top:10px; font-style:italic;">Ket: ${data["Keterangan"] || '-'}</p>
                    </div>
                `;
            });
        } else {
            display.innerHTML = "<p style='color:red; margin-top:20px;'>Data tidak ditemukan.</p>";
        }
    }
</script>

</body>
</html>
