<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Layanan Bansos RW 05</title>
    
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --primary: #2c3e50;
            --secondary: #34495e;
            --accent: #ff7a00;
            --success: #28a745;
            --danger: #dc3545;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 { color: var(--primary); margin-bottom: 10px; }
        p.subtitle { color: #666; margin-bottom: 25px; font-size: 14px; }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: var(--accent); }

        button {
            padding: 12px 25px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background: #e66e00; }

        .result-item {
            text-align: left;
            background: #fff;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            position: relative;
        }

        .status-badge {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 4px 12px;
            border-radius: 20px;
            color: white;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
            border-top: 1px solid #f0f0f0;
            padding-top: 15px;
        }

        .info-box span { display: block; font-size: 11px; color: #999; margin-bottom: 2px; }
        .info-box strong { font-size: 14px; color: #333; }

        .loading { color: #888; font-style: italic; margin-bottom: 15px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Cek Penerima Bansos</h2>
        <p class="subtitle">Portal Digital Karang Taruna RW 05 Pulo Gebang</p>

        <div id="loader" class="loading">Memuat database Excel...</div>

        <div class="search-box">
            <input type="text" id="inputCari" placeholder="Masukkan Nama atau NIK (16 digit)..." onkeypress="if(event.key === 'Enter') cariData()">
            <button onclick="cariData()">CARI</button>
        </div>

        <div id="hasilPencarian">
            </div>
    </div>

    <script>
        let dbBansos = [];

        // 1. OTOMATIS LOAD EXCEL SAAT WEB DIBUKA
        window.addEventListener('DOMContentLoaded', async () => {
            const loader = document.getElementById('loader');
            loader.style.display = 'block';

            try {
                // Pastikan file "bansos.xlsx" ada di folder yang sama
                const response = await fetch('bansos.xlsx');
                if (!response.ok) throw new Error("File bansos.xlsx tidak ditemukan.");
                
                const arrayBuffer = await response.arrayBuffer();
                const workbook = XLSX.read(arrayBuffer, { type: 'array' });
                
                // Ambil sheet pertama
                const sheet = workbook.Sheets[workbook.SheetNames[0]];
                dbBansos = XLSX.utils.sheet_to_json(sheet);
                
                loader.innerHTML = "✅ Database Terhubung";
                setTimeout(() => loader.style.display = 'none', 2000);
            } catch (err) {
                loader.innerHTML = "❌ Gagal memuat database Excel.";
                console.error(err);
            }
        });

        // 2. LOGIKA PENCARIAN
        function cariData() {
    // 1. Ambil input dan bersihkan spasi, lalu ubah ke huruf kecil
    const input = document.getElementById("inputCari").value.trim().toLowerCase();
    const display = document.getElementById("hasilPencarian");
    display.innerHTML = "";

    if (!input) {
        alert("Silakan masukkan Nama atau NIK!");
        return;
    }

    // 2. Logika Filter yang mendukung potongan nama (Partial Match)
    const hasil = dbBansos.filter(item => {
        // Pastikan data kolom Nama dan NIK ada di Excel untuk menghindari error
        const namaDiExcel = item.Nama ? item.Nama.toString().toLowerCase() : "";
        const nikDiExcel = item.NIK ? item.NIK.toString() : "";

        // Cek apakah input ada di dalam Nama ATAU di dalam NIK
        return namaDiExcel.includes(input) || nikDiExcel.includes(input);
    });

    // 3. Tampilkan Hasil
    if (hasil.length > 0) {
        hasil.forEach(data => {
            const isLayak = data.Status === "Layak";
            const badgeBg = isLayak ? "#28a745" : "#dc3545";
            
            // Masking NIK (Sensor)
            const maskedNIK = data.NIK 
                ? data.NIK.toString().replace(/(\d{6})\d+(\d{4})/, "$1******$2") 
                : "Tidak Tersedia";

            display.innerHTML += `
                <div class="result-item" style="border-left: 6px solid ${badgeBg}; text-align: left; background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative;">
                    <span class="status-badge" style="position: absolute; top: 15px; right: 15px; background: ${badgeBg}; color: white; padding: 3px 10px; border-radius: 10px; font-size: 10px;">${data.Status}</span>
                    <h3 style="margin: 0; font-size: 16px;">${data.Nama}</h3>
                    <p style="margin: 5px 0; font-size: 12px; color: #777;">NIK: ${maskedNIK}</p>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; font-size: 13px;">
                        <div><small style="color:#999; display:block;">Jenis</small> <strong>${data.Jenis || '-'}</strong></div>
                        <div><small style="color:#999; display:block;">RT</small> <strong>${data.RT || '-'}</strong></div>
                    </div>
                </div>
            `;
        });
    } else {
        display.innerHTML = "<p style='color:#888; margin-top: 20px;'>Data tidak ditemukan. Coba masukkan nama yang berbeda.</p>";
    }
}
    </script>
</body>
</html>
